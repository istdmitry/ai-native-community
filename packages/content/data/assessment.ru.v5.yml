
meta:
  locale: ru
  fallback_locale: en
  source: content/assessment.core.v5.yml

# =============================================================================
# PRE-SCREENER (Blueprint v2)
# =============================================================================

prescreener:
  intro:
    title: "Персонализируем вашу оценку"
    subtitle: "3 быстрых вопроса для настройки опыта"
    cta: "Начать"

  questions:
    - id: ps.1
      prompt: "Как часто вы используете ИИ-чаты?"
      answers:
        - id: ps.1.a
          label: "Почти каждый день"
        - id: ps.1.b
          label: "Несколько раз в неделю"
        - id: ps.1.c
          label: "Иногда"
        - id: ps.1.d
          label: "Пробовал пару раз"

    - id: ps.2
      prompt: "Сколько разных ИИ-инструментов вы используете?"
      answers:
        - id: ps.2.a
          label: "3 и больше"
          subtext: "Чат, написание, код, изображения и т.д."
        - id: ps.2.b
          label: "2 инструмента"
        - id: ps.2.c
          label: "Только один"
        - id: ps.2.d
          label: "Не уверен / не регулярно"

    - id: ps.3
      prompt: "У вас есть сохраненные промпты, шаблоны или привычные способы работы с ИИ?"
      answers:
        - id: ps.3.a
          label: "Да, собрал коллекцию"
        - id: ps.3.b
          label: "Несколько вещей использую повторно"
        - id: ps.3.c
          label: "Нет, каждый раз с нуля"
        - id: ps.3.d
          label: "Что вы имеете в виду?"

# =============================================================================
# TRACK CONFIGURATIONS (Blueprint v2)
# =============================================================================

tracks:
  - id: beginner
    name: "Начальный трек"
    result_framing:
      intro: "Вот где вы находитесь на пути к ИИ"
      encouragement: "Вы не одиноки — большинство профессионалов на этом этапе."

  - id: advanced
    name: "Продвинутый трек"
    result_framing:
      intro: "Ваш продвинутый режим работы с ИИ"
      encouragement: "Вы впереди большинства — найдем ваши краевые случаи."

# =============================================================================
# DEFAULT ANSWER LABELS (Blueprint v2)
# =============================================================================

default_answers:
  yes:
    label: "ДА"
    subtext: "Это про меня"
  no:
    label: "НЕТ"
    subtext: "Не моя ситуация"

# =============================================================================
# TONE MODIFIERS (Blueprint v2)
# =============================================================================

tone_modifiers:
  encouraging:
    result_prefix: "Вы делаете первые шаги — это главное."
    result_suffix: "Маленькие шаги ведут к большим переменам."

    level_wrappers:
      L1:
        opener: "Вы в начале своего пути с ИИ."
        next_move_prefix: "Ваш следующий маленький шаг: "
        encouragement: "Большинство профессионалов именно здесь. То, что вы оцениваете себя, уже ставит вас впереди."
      L2:
        opener: "Вы начали строить привычки — это реальный прогресс."
        next_move_prefix: "Чтобы продолжить рост: "
        encouragement: "Вы больше не просто экспериментируете. Вы что-то строите."

    cost_reframe:
      prefix: "Что вас сдерживает: "

    breaks_reframe:
      prefix: "Где возникают сложности: "

  challenge:
    result_prefix: null
    result_suffix: null

    level_wrappers:
      L3:
        opener: "Вы координируете несколько ИИ-инструментов — это нетривиально."
        next_move_prefix: "Ваше преимущество для развития: "
        encouragement: null
      L4:
        opener: "Вы построили процессы. Теперь они должны работать без вас."
        next_move_prefix: "Ваша следующая оптимизация: "
        encouragement: null
      L5:
        opener: "Вы персонализировали свою настройку. Немногие добираются сюда."
        next_move_prefix: "Ваше уточнение: "
        encouragement: "Вы впереди большинства. Найдем, что еще делается вручную."
      L6:
        opener: "Вы работаете с цифровой командой. Это редкость."
        next_move_prefix: "Ваш вызов в управлении: "
        encouragement: "Нам интересно узнать, как вы сюда пришли."
      L7:
        opener: "Вы строите системы, работающие между людьми. Территория пионеров."
        next_move_prefix: "Горизонт: "
        encouragement: "Вы определяете, что возможно. Давайте поговорим."

    cost_reframe:
      prefix: "Узкое место: "

    breaks_reframe:
      prefix: "Что ломается под нагрузкой: "

strings:
  ui_strings:
    answers:
      yes: "ДА - Это про меня сейчас"
      not_yet: "ПОКА НЕТ - Это не мой текущий режим"
    accuracy_tiers:
      low: "Низкая точность"
      medium: "Средняя точность"
      high: "Высокая точность"
    progress:
      starter_in_progress: "Определяем ваши ограничения..."
      starter_complete: "Базовая карта готова!"
      accuracy_prompt: "Точность: низкая | Хотите улучшить?"
    micro_feedback:
      low_levels:
        yes: "Вы не одиноки. Здесь находится большинство людей."
        not_yet: "Интересно. Вы уже вышли за это ограничение."
      level5:
        yes: "Это продвинутый уровень. Немногие сталкиваются с этим."
        not_yet: "Это ожидаемо. Большинство людей не доходят до этого уровня."
      level6:
        yes: "Вы в редкой компании. Мы будем рады узнать вашу историю."
        not_yet: "Это ожидаемо. Почти никто не работает на этом уровне."
      level7:
        yes: "Вы строите будущее. Давайте поговорим."
        not_yet: "Это пока формируется, даже для продвинутых пользователей."

  cards:
    step0_reality_check:
      title: "Прежде чем начать"
      body: |
        Контекст: 95% людей сейчас работают на уровнях 1-2. Уровни 6-7 — это горизонт; почти никто там ещё не находится.

        Фокус: Мы исследуем ваши привычки и поведение с ИИ, а не технические навыки. Правильных и неправильных ответов нет.

        Путь: Сначала 3 быстрых вопроса о том, как вы используете ИИ сегодня (~30 секунд). Затем 6 конкретных ситуаций — просто скажите, какие из них вам знакомы (~2 минуты). После этого вы можете уточнить результаты или сразу их посмотреть.

        Результат: Ясная картина того, где вы находитесь на кривой внедрения ИИ, что вас сдерживает, и один конкретный следующий шаг.
      cta_start: "Поехали"
    high_baseline_gate:
      title: "Обнаружен высокий базовый уровень"
      body: |
        Ваши ответы показывают необычно сильные основы.
        Вы, вероятно, вышли за типичные ограничения уровней 1-3.

        Мы можем провести продвинутую калибровку для уровня 3+,
        или показать предварительный результат сейчас.
      cta_advanced: "Запустить продвинутую калибровку"
      cta_provisional: "Показать предварительный результат"
    accuracy_choice:
      title: "Улучшить точность?"
      body: "Выберите один необязательный шаг для уточнения результата."
      options:
        - id: quick_questions
          label: "Быстрые вопросы (3) - около 1 минуты"
        - id: micro_scenarios
          label: "Микросценарии (3) - около 2-3 минут"
        - id: more_cases
          label: "Еще случаи (4) - около 2 минут"
        - id: explore_all
          label: "Изучить все случаи (6-8 минут)"
        - id: see_result
          label: "Показать результат (0 минут)"
    habit_checkpoint:
      title: "Следующая привычка (выберите одну)"
      intro: "На основе ваших ограничений это минимальное изменение, которое дает эффект:"
      cta_accept: "Я попробую это"
      cta_skip: "Пропустить"
      by_pillar:
        context_system:
          text: "Перед любой задачей с ИИ потратьте 30 секунд на формулировку рамки (что нужно, почему важно, ограничения)."
        orchestration_load:
          text: "Выберите один повторяющийся процесс. Запишите шаги. Используйте их в следующий раз."
        verification_control:
          text: "Определите done заранее. Проверяйте результат перед принятием."
    compare_yourself:
      title: "Где вы находитесь?"
      intro: "По данным 500+ оценок:"
      bullets:
        - "Ваш уровень: {level}"
        - "Самый частый уровень: {most_common_level} ({most_common_percent})"
        - "Ваша сильная сторона: {strongest_pillar} (топ {strongest_percent})"
        - "Ваше ограничение: {constraint_pillar} ({constraint_percent} имеют то же)"
      note: "Это не соревнование. Понимание общих трудностей помогает не чувствовать себя одиноким."
  cases:
    case.1A:
      title: "ИИ остается на обочине (как абонемент в спортзал)"
      body: "За последний месяц ИИ оставался для меня периферийным инструментом. Я пробовал ИИ-функции несколько раз, но они не прижились. ИИ появляется как побочная функция, а не как часть того, как устроена работа."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.1B:
      title: "День сурка: каждый раз с нуля"
      body: "Сейчас использование ИИ часто похоже на старт с нуля. Он не знает мой домен, предпочтения или историю. Ответы остаются общими, если я не прикладываю много усилий каждый раз."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.2A:
      title: "Магия демо против реальности понедельника"
      body: "За последние 4-6 недель я внедрил инструмент или процесс с ИИ, который поначалу выглядел отлично. В реальной работе под давлением и с грязными данными надежность упала. Я снова вернулся к ручным исправлениям вместо того, чтобы сделать это стабильным."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"
      follow_up:
        title: "Уточнение (по вашему ответу)"
        recap: "Вы ответили ДА на: {CASE_TITLE}"
        prompt: "Чтобы понять, остается ли это ограничением:"
        answers:
          yes: "ДА - У меня есть стабильный способ справляться с этим"
          not_yet: "ПОКА НЕТ - Все еще зависит от импровизации с моей стороны"

    case.2B:
      title: "Рулетка промптов: тот же ввод, другой результат"
      body: "Сейчас я все еще получаю непредсказуемые результаты. Иногда ИИ дает отличный ответ, а похожая попытка проваливается. Я не могу надежно понять, какая деталь ввода это определила."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"
      follow_up:
        title: "Уточнение (по вашему ответу)"
        recap: "Вы ответили ДА на: {CASE_TITLE}"
        prompt: "Чтобы понять, остается ли это ограничением:"
        answers:
          yes: "ДА - У меня есть стабильный способ справляться с этим"
          not_yet: "ПОКА НЕТ - Все еще зависит от импровизации с моей стороны"

    case.2C:
      title: "Один чат для всего, но контекст не переносится"
      body: "Сейчас я постоянно использую ChatGPT. Но мой контекст живет в старых чатах. Часть устарела или неверна. Я не могу чисто обновлять его. Когда работа переходит в документы, почту или IDE, полезный контекст не переносится."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.3A:
      title: "Я снова и снова все объясняю"
      body: "За последний месяц мне приходилось многократно заново объяснять задачи и фон в разных ИИ-инструментах. Общая картина живет у меня в голове. Когда инструменты действительно разделяют актуальный контекст, результат резко улучшается, и фрагментация становится еще более болезненной."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.3B:
      title: "Умно по отдельности, глупо вместе"
      body: "Сейчас ИИ помогает внутри отдельных инструментов. Но ничто не переносится между ними. Каждый инструмент умен сам по себе и бесполезен, когда я пытаюсь соединить процессы."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.3C:
      title: "Хороший контекст в одном месте, хаос везде"
      body: "Сейчас в некоторых средах (рабочее пространство, IDE или хорошо структурированная база знаний) переключение контекста между артефактами кажется естественным. В чатах контекст хаотичен и плохо исправляется. Я уже почувствовал, каким бывает хороший контекст, и отсутствие этого особенно болезненно."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"
    case.3D:
      title: "Круговые разговоры, которые никуда не ведут"
      body: "Сейчас я трачу время на исправление и уточнение ИИ. Разговор растет, но согласование не происходит. Это не проблема коммуникации, это проблема структуры."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"
      follow_up:
        title: "Уточнение (по вашему ответу)"
        recap: "Вы ответили ДА на: {CASE_TITLE}"
        prompt: "Чтобы понять, остается ли это ограничением:"
        answers:
          yes: "ДА - У меня есть стабильный способ справляться с этим"
          not_yet: "ПОКА НЕТ - Все еще зависит от импровизации с моей стороны"

    case.3E:
      title: "ИИ не понимает, какую роль я сейчас выполняю"
      body: "Сейчас у меня разные контексты: работа, здоровье, семья, сторонние проекты. ИИ смешивает их. Он подтягивает неверные предположения. Он не понимает, какая версия меня говорит."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.4A:
      title: "Процессы есть, но без меня они разваливаются"
      body: "Сейчас я могу запускать многошаговую работу с ИИ или агентами. Но под давлением времени или при нескольких задачах одновременно процесс не стандартизирован: проверки качества, передачи и эскалации зависят от меня. Когда я не веду вручную, надежность падает."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.4B:
      title: "Выглядит правильно, но не контролируется"
      body: "Сейчас результат ИИ часто выглядит разумно. Но при проверке он не соответствует стабильному стандарту. Проблема не в усилиях; проблема в отсутствии проверок, критериев приемки и обработки исключений."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.5A:
      title: "Поддерживать свежесть контекста - это и есть работа"
      body: "За последний месяц я заметил: когда контекст актуален, ИИ работает заметно лучше. Но поддерживать его в актуальном состоянии сложно. Что-то важное всегда чуть устаревает, и именно там процессы ломаются."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.5B:
      title: "Я изменился, а система - нет"
      body: "Недавно я заметил дрейф: я аккуратно фиксирую правила и контекст, а затем вижу, что ИИ следует старой версии меня. Мои приоритеты и стиль решений изменились, а настройка не успела."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.5C:
      title: "Автоматизации, за которыми нужно присматривать"
      body: "Сейчас у меня настроены агенты или автоматизации (Zapier, Make, n8n или агентные инструменты). Они могут выполнять задачи, но мне приходится за ними следить. Они ломаются на крайних случаях. Автоматизация есть, автономности нет."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.6A:
      title: "Главный обработчик исключений - все еще я"
      body: "Сейчас агенты могут выполнять задачи, но они не расставляют приоритеты, не разрешают конфликты и не координируют других агентов от моего имени. Все важные исключения возвращаются ко мне."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.6B:
      title: "Делегирование выявляет то, что я не формализовал"
      body: "Когда я масштабирую делегирование, всплывают вопросы, которые я никогда не формализовал: почему я выбираю A вместо B, что важно при конфликте, что я оптимизирую. Я больше полагался на интуицию, чем думал."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.6C:
      title: "Мои решения не накапливаются"
      body: "Я могу сохранять решения и эвристики, но система все равно принимает решения, которые я бы не принял. Мое суждение ситуативно: я взвешиваю факторы по-разному в зависимости от контекста. Мне нужен способ сохранять, повторно использовать и накапливать то, как принимаются решения, чтобы система улучшалась вместе со мной."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"

    case.7A:
      title: "Моя система не переносится на других"
      body: "Сейчас моя настройка ИИ работает для меня. Но когда я пытаюсь поделиться процессом, передать контекст-прокси или отдать ограниченную роль коллеге, все ломается. Система персональная, а не переносимая между людьми."
      answers:
        yes: "ДА - Это про меня сейчас"
        not_yet: "ПОКА НЕТ - Это не мой текущий режим"
  micro_scenarios:
    ms.1:
      title: "ИИ дает черновик, который вам не нравится"
      prompt: "Что вы делаете, чтобы предотвратить это в следующий раз?"
      options:
        ms1.a: "Ничего, исправлю вручную каждый раз"
        ms1.b: "Сохраню лучший промпт на будущее"
