    ru: "Вы работаете на уровне L{{level}} - это редкость."
  explanation:
    en: "We don't give prescriptive habits at L4+ because generic advice can destabilize what works."
    ru: "Мы не даём предписывающих привычек на L4+, потому что общие советы могут дестабилизировать то, что работает."
  cta:
    en: "For a customized improvement plan at L4+, book a 1:1 consultation."
    ru: "Для индивидуального плана развития на L4+ закажите персональную консультацию."
