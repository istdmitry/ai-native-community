report_positioning:
  tool_agnostic_hook:
    title:
      en: "Why this report is tool-agnostic"
      ru: "Почему этот отчёт не зависит от инструментов"
    bullets:
      en:
        - "We don't recommend tools here because we don't know your ecosystem, constraints, and workflows."
        - "Instead we focus on behavioral constraints and habit upgrades that work anywhere."
        - "For a fully customized report mapped to your stack, book a 1:1 consultation."
      ru:
        - "Мы не рекомендуем инструменты, потому что не знаем вашу экосистему, ограничения и рабочие процессы."
        - "Вместо этого мы фокусируемся на поведенческих ограничениях и привычках, которые универсальны."
        - "Для полностью индивидуализированного отчёта под ваш стек закажите персональную консультацию."

  what_this_means:
    title:
      en: "What This Means"
      ru: "Что это значит"
    content:
      en:
        - "This is not a grade. It is a constraint map."
        - "Your overall level is your typical performance (median of all pillars)."
        - "Your constraint pillar shows where to focus next for the biggest impact."
        - "Progress is a habit change: small rules repeated until they become automatic."
      ru:
        - "Это не оценка. Это карта ограничений."
        - "Ваш общий уровень отражает вашу типичную производительность (медиану всех столпов)."
        - "Ваш ограничивающий столп показывает, на чём сфокусироваться для наибольшего прогресса."
        - "Прогресс — это изменение привычек: маленькие правила, повторяемые до тех пор, пока не станут автоматическими."

# Constraint explanation shown in dashboard report (L1-L3 habit training variant)
constraint_explanation:
  en: "Your constraint pillar is where focused effort will make the biggest difference in your AI workflow."
  ru: "Ваш ограничивающий столп — это область, где целенаправленное улучшение окажет наибольшее влияние на надёжность ваших ИИ-процессов."

