    ru: "Низкая уверенность"

overall_level_meaning:
  "1":
    en:
      - "AI helps with one-off tasks, but nothing is designed to repeat."
      - "Context resets each time; quality depends on luck + manual patching."
      - "Nothing compounds; good outputs die as one-offs."
    ru:
      - "ИИ помогает с разовыми задачами, но ничего не спроектировано для повторного использования."
      - "Контекст сбрасывается каждый раз; качество зависит от удачи + ручной доработки."
      - "Ничего не накапливается; хорошие результаты остаются разовыми."

  "2":
    en:
      - "You can repeat tasks across tools, but context breaks apart and drifts."
      - "Trust requires constant checking; portability breaks."
      - "Reuse exists, but it's shallow and decays."
    ru:
      - "Вы можете повторять задачи в разных инструментах, но контекст фрагментируется и дрейфует."
      - "Доверие требует постоянной проверки; переносимость нарушается."
      - "Повторное использование есть, но оно поверхностное и угасает."

  "3":
    en:
      - "You can complete multi-step work, but you are the routing layer."
      - "Switching, version drift, and hidden assumptions make you the bottleneck."
      - "Progress requires standardized handoffs and checkpoints."
    ru:
      - "Вы можете выполнять многоэтапную работу, но вы — уровень маршрутизации."
      - "Переключение, дрейф версий и скрытые допущения делают вас узким местом."
      - "Прогресс требует стандартизированных передач и контрольных точек."

  "4":
    en:
      - "Standardized workflows handle work across multiple tools."
      - "Bottleneck shifts to standards, review load, and exception handling."
    ru:
      - "Стандартизированные рабочие процессы управляют многоинструментным исполнением."
      - "Узкое место смещается к стандартам, нагрузке на ревью и обработке исключений."

  "5":
    en:
      - "Workflows are built around how you think; orchestration partly delegated."
      - "Primary risk becomes drift (context + behavior lag behind reality)."
    ru:
      - "Рабочие процессы настроены под ваше мышление; оркестрация частично делегирована."
      - "Основной риск — дрейф (контекст + поведение отстают от реальности)."

  "6":
    en:
      - "Role-based digital team that keeps itself updated and governed."
      - "Constraint becomes knowing who owns decisions and where the lines are."
    ru:
      - "Ролевая цифровая команда с непрерывным обновлением и управлением."
      - "Ограничением становится владение решениями и контроль границ."

next_transition_one_liners:
  "1":
    en: "Make one workflow repeatable by writing the minimum frame + definition of done."
    ru: "Сделайте один рабочий процесс повторяемым, написав минимальный фрейм + определение готовности."
  "2":
    en: "Stop rewriting context. Create one portable context card and refresh it deliberately."
    ru: "Прекратите переписывать контекст. Создайте одну переносимую карту контекста и обновляйте её осознанно."
  "3":
    en: "Stop being the message bus. Define handoffs and checkpoints so routing isn't you."
    ru: "Перестаньте быть шиной сообщений. Определите передачи и контрольные точки, чтобы маршрутизация не зависела от вас."

plan_success_criteria:
  en:
    - "I have a reusable artifact (template/runbook/checklist) that I used at least twice."
    - "I have at least one explicit verification checkpoint (not only final review)."
    - "I have a stable context location + a refresh trigger."
  ru:
    - "У меня есть переиспользуемый артефакт (шаблон/ранбук/чеклист), который я использовал минимум дважды."
    - "У меня есть минимум одна явная контрольная точка проверки (не только финальный ревью)."
    - "У меня есть стабильное место для контекста + триггер обновления."

