
meta:
  id: ai_native_levels_assessment
  version: v2
  locale: en
  title: AI Native Levels Assessment
  short_title: "Reliable AI Assessment"
  description: "Guided assessment to map working mode (L1-L7) and constraints across five pillars. Includes pre-screener, smart follow-ups, and track-based routing."

# =============================================================================
# PILLARS
# =============================================================================

pillars:
  - id: context_system
    name: Context System
    description: "How context is captured, travels across tools, stays fresh, and gets updated."
    visibility: public
  - id: orchestration_load
    name: Orchestration Load
    description: "How much routing depends on you versus workflows with defined handoffs and escalation."
    visibility: public
  - id: verification_control
    name: "Verification & Control"
    description: "How much you can trust outputs without supervision: standards, checkpoints, and exception handling."
    visibility: public
  - id: codification_reuse
    name: Codification & Reuse
    description: "Whether outputs become maintained assets instead of abandoned artifacts."
    visibility: gated
  - id: personal_fit
    name: Personal Fit & Adaptation
    description: "Whether the system matches your cognitive patterns and stays aligned as you evolve."
    visibility: gated

# =============================================================================
# LEVELS
# =============================================================================

levels:
  - id: L1
    name: Level 1
    mode_name: Ad Hoc Executor
  - id: L2
    name: Level 2
    mode_name: Repeatable Operator
  - id: L3
    name: Level 3
    mode_name: Manual Orchestrator
  - id: L4
    name: Level 4
    mode_name: Process Orchestrator
  - id: L5
    name: Level 5
    mode_name: Personalized Delegator
  - id: L6
    name: Level 6
    mode_name: Digital Team Lead
  - id: L7
    name: Level 7
    mode_name: Networked Teams

# =============================================================================
# PRE-SCREENER (v5.5 NEW)
# =============================================================================

prescreener:
  intro:
    title: "Let's personalize your assessment"
    subtitle: "3 quick questions so we know where to start"
    cta: "Get Started"

  questions:
    - id: ps.1
      prompt: "How often do you use AI chats?"
      answers:
        - id: ps.1.a
          label: "Most days"
          points: 2
        - id: ps.1.b
          label: "A few times a week"
          points: 1
        - id: ps.1.c
          label: "Occasionally"
          points: 0
        - id: ps.1.d
          label: "Tried it once or twice"
          points: 0

    - id: ps.2
      prompt: "How many different AI products do you use?"
      answers:
        - id: ps.2.a
          label: "3 or more"
          subtext: "ChatGPT, Claude, Gemini, Midjourney, etc."
          points: 2
        - id: ps.2.b
          label: "2 tools"
          points: 1
        - id: ps.2.c
          label: "Just one"
          points: 0
        - id: ps.2.d
          label: "Not sure / none regularly"
          points: 0

    - id: ps.3
      prompt: "Do you have saved prompts, templates, or go-to ways of using AI?"
      answers:
        - id: ps.3.a
          label: "Yes, I've built up a collection"
          points: 2
        - id: ps.3.b
          label: "A few things I reuse"
          points: 1
        - id: ps.3.c
          label: "No, I start fresh each time"
          points: 0
        - id: ps.3.d
          label: "What do you mean?"
          points: 0

  routing:
    threshold: 3  # Points 0-2 = beginner, 3-6 = advanced
    tracks:
      - id: beginner
        condition: "points <= 2"
      - id: advanced
        condition: "points >= 3"

# =============================================================================
# TRACK CONFIGURATIONS (v5.5 NEW)
# =============================================================================
# Note: v5.5 uses track-specific starter_6 sets defined below.
# The `starter_6: true` and `starter_6_order` flags on individual cases
# are v5.0 legacy references (for Advanced track backwards compatibility).
# In v5.5, tracks.starter_6 takes precedence.

tracks:
  - id: beginner
    name: "Beginner Track"
    target_levels: [1, 2]
    language_mode: plain  # DEFERRED: plain/standard language variants not yet implemented
    tone: encouraging
    high_baseline_gate: false  # Beginners skip high-baseline gate

    starter_6:
      - case.1A  # AI on sidelines
      - case.1B  # Generic responses
      - case.2A  # Inconsistent results
      - case.2B  # Prompt roulette
      - case.2C  # Nothing carries over
      - case.3A  # Repeating myself

    skip_cases:
      - case.5A
      - case.5B
      - case.5C
      - case.6A
      - case.6B
      - case.6C
      - case.7A

    result_framing:
      intro: "Here's where you are on your AI journey"
      encouragement: "You're not alone — most professionals are at this stage."

  - id: advanced
    name: "Advanced Track"
    target_levels: [3, 4, 5, 6, 7]
    language_mode: standard  # DEFERRED: plain/standard language variants not yet implemented
    tone: challenge
    high_baseline_gate: true  # Advanced users may trigger high-baseline

    starter_6:
      - case.3B  # Tool silos
      - case.4A  # Babysitting AI
      - case.4B  # Trust but verify
      - case.5A  # Context decay
      - case.5B  # AI doesn't know me
      - case.6C  # Can't hand off decisions

    skip_cases:
      - case.1A
      - case.1B

    result_framing:
      intro: "Here's your advanced AI working mode"
      encouragement: "You're ahead of most — let's find your edge cases."

# =============================================================================
# DEFAULT ANSWER LABELS
# =============================================================================

default_answers:
  yes:
    label: "YES"
    subtext: "That's me"
  no:
    label: "NOPE"
    subtext: "Not my situation"

# =============================================================================
# UI STRINGS
# =============================================================================

ui_strings:
  accuracy_tiers:
    low: Low accuracy
    medium: Medium accuracy
    high: High accuracy
  progress:
    starter_in_progress: "Mapping your constraints..."
    starter_complete: "Core mapping complete!"
    accuracy_prompt: "Accuracy: Low | Want to improve it?"
  micro_feedback:
    low_levels:
      yes: "You're not alone. This is where most people are."
      no: "Interesting. You've moved past this constraint."
    level5:
      yes: "This is advanced territory. Few people experience this problem."
      no: "That's expected. Most people don't reach this level yet."
    level6:
      yes: "You're in rare company. We'd love to hear your story."
      no: "That's expected. Almost nobody operates at this level yet."
    level7:
      yes: "You're building the future. Let's talk."
      no: "This is still emerging, even for advanced users."
  follow_up:
    header: "Follow-up"
    context_line: "You answered {answer} to:"

# =============================================================================
# CARDS (NON-CASE SCREENS)
# =============================================================================

cards:
  step0_reality_check:
    title: "Before You Start"
    body: |
      The Context: 95% of people currently operate at Levels 1-2. Levels 6-7 are aspirational; almost no one is there yet.

      The Focus: We're mapping your behaviors and habits with AI, not your technical skills. There are no right or wrong answers.

      The Journey: First, 3 quick questions about how you use AI today (~30 seconds). Then, 6 specific situations — just tell us which ones feel familiar (~2 minutes). After that, you can refine your results or see them immediately.

      The Outcome: A clear picture of where you are on the AI adoption curve, what's holding you back, and one concrete next step.
    cta_start: "Let's go"

  high_baseline_gate:
    title: "High baseline detected"
    body: |
      Your answers show unusually strong fundamentals.
      You're past the common Level 1-3 constraints.

      We can run advanced calibration to detect Level 3+,
      or show a provisional result now.
    cta_advanced: "Run advanced calibration"
    cta_provisional: "See provisional result"

  accuracy_choice:
    title: "Improve accuracy?"
    body: "Choose one optional path to refine your result."
    options:
      - id: quick_questions
        label: "Quick questions (3) - about 1 minute"
      - id: micro_scenarios
        label: "Micro-scenarios (3) - about 2-3 minutes"
      - id: more_cases
        label: "More cases (4) - about 2 minutes"
      - id: explore_all
        label: "Explore all cases (6-8 minutes)"
      - id: see_result
        label: "See my result (0 minutes)"

  habit_checkpoint:
    title: "Your next habit (pick one)"
    intro: "Based on your constraints, here is the smallest change that compounds:"
    cta_accept: "I'll try this"
    cta_skip: "Skip for now"
    by_pillar:
      context_system:
        text: "Before starting any AI task, spend 30 seconds writing the frame (what you want, why it matters, constraints)."
      orchestration_load:
        text: "Pick one recurring workflow. Write down the steps. Use the same steps next time."
      verification_control:
        text: "Define \"done\" before you start. Check against it before accepting output."

  compare_yourself:
    title: "Where do you stand?"
    intro: "Based on 500+ assessments:"
    bullets:
      - "Your level: {level}"
      - "Most common level: {most_common_level} ({most_common_percent})"
      - "Your strongest pillar: {strongest_pillar} (top {strongest_percent})"
      - "Your constraint: {constraint_pillar} ({constraint_percent} share this)"
    note: "This isn't a competition. Knowing where others struggle can help you feel less alone."

# =============================================================================
# CASES (19 total)
# =============================================================================

cases:

  # ---------------------------------------------------------------------------
  # CASE 1A - L1 Orchestration
  # ---------------------------------------------------------------------------
  - id: case.1A
    title: "AI stays on the sidelines (like a gym membership)"
    body: "AI isn't really part of how I work. I've tried AI chats like ChatGPT, Claude, Gemini, or DeepSeek a few times, but it didn't stick. It's still a side thing, not a real part of my workflow."
    level: 1
    pillar: orchestration_load

    answers:
      yes:
        label: "YES"
        subtext: "That's me"
      no:
        label: "NOPE"
        subtext: "Not my situation"

    signals:
      yes:
        - pillar: orchestration_load
          level: 1
          weight: 1.0
      no: []  # No signal - other cases will detect their level

    follow_up_yes: null
    follow_up_no: null

    image_prompt: "Minimalist editorial illustration, calm executive tone. Visual metaphor for an unused tool placed at the edge of a clean desk while the main workspace is active. Clean shapes, subtle gradients, neutral palette, no text, no logos, no faces, no robots, no sci-fi. Composition suitable for a card thumbnail. High clarity."

  # ---------------------------------------------------------------------------
  # CASE 1B - L1 Context
  # ---------------------------------------------------------------------------
  - id: case.1B
    title: "Groundhog Day: starting from zero every time"
    body: "Using AI feels like starting from scratch every time. It doesn't know my work, my preferences, or what I've done before. I get generic answers unless I put in a lot of effort each time."
    level: 1
    pillar: context_system

    answers:
      yes:
        label: "YES"
        subtext: "That's me"
      no:
        label: "NOPE"
        subtext: "Not my situation"

    signals:
      yes:
        - pillar: context_system
          level: 1
          weight: 1.0
      no: []

    follow_up_yes: null

    follow_up_no:
      prompt: "Is that because AI remembers your background and preferences?"
      answers:
        yes:
          label: "YES"
          subtext: "It knows my stuff"
        no:
          label: "NOPE"
          subtext: "I just don't use it much"
      signals:
        yes:
          - pillar: context_system
            level: 4
            weight: 0.8
        no:
          - pillar: context_system
            level: 1
            weight: 0.5

    image_prompt: "Minimalist editorial illustration, calm executive tone. Visual metaphor for a blank page or whiteboard being wiped clean, representing starting from zero each time. Clean shapes, subtle gradients, neutral palette, no text, no logos, no faces, no robots, no sci-fi. Composition suitable for a card thumbnail. High clarity."

  # ---------------------------------------------------------------------------
  # CASE 2A - L2 Verification
  # ---------------------------------------------------------------------------
  - id: case.2A
    title: "Demo magic vs Monday morning reality"
    body: "I've tried to use AI for real work, but the results are too inconsistent. I can't rely on it."
    level: 2
    pillar: verification_control

    answers:
      yes:
        label: "YES"
        subtext: "That's me"
      no:
        label: "NOPE"
        subtext: "Not my situation"

    signals:
      yes:
        - pillar: verification_control
          level: 2
          weight: 1.0
      no: []

    follow_up_yes:
      prompt: "Have you found ways to make at least some tools reliable?"
      answers:
        yes:
          label: "YES"
          subtext: "I've figured some things out"
        no:
          label: "NOPE"
          subtext: "Still struggling"
      signals:
        yes:
          - pillar: verification_control
            level: 4
            weight: 0.7
        no:
          - pillar: verification_control
            level: 2
            weight: 1.0

    follow_up_no:
      prompt: "Is that because you've figured out how to get reliable results?"
      answers:
        yes:
          label: "YES"
          subtext: "I've got it working"
        no:
          label: "NOPE"
          subtext: "Haven't tried much yet"
      signals:
        yes:
          - pillar: verification_control
            level: 4
            weight: 1.0
        no:
          - pillar: verification_control
            level: 1
            weight: 0.5

    image_prompt: "Minimalist editorial illustration, calm executive tone. Visual metaphor for a sleek prototype structure that sags or fails under a small weight, representing reliability dropping in real work. Clean shapes, subtle gradients, neutral palette, no text, no logos, no faces, no robots, no sci-fi. Composition suitable for a card thumbnail. High clarity."

  # ---------------------------------------------------------------------------
  # CASE 2B - L2 Verification
  # ---------------------------------------------------------------------------
  - id: case.2B
    title: "Prompt roulette: same input, surprise output"
    body: "I get inconsistent results. Sometimes AI nails it, then I try something similar and it completely misses. I can't figure out what makes the difference."
    level: 2
    pillar: verification_control

    answers:
      yes:
        label: "YES"
        subtext: "That's me"
      no:
        label: "NOPE"
        subtext: "Not my situation"

    signals:
      yes:
        - pillar: verification_control
          level: 2
          weight: 1.0
      no: []

    follow_up_yes:
      prompt: "Have you figured out what makes the results consistent?"
      answers:
        yes:
          label: "YES"
          subtext: "At least for some things"
        no:
          label: "NOPE"
          subtext: "Still feels random"
      signals:
        yes:
          - pillar: context_system
            level: 3
            weight: 0.7
          - pillar: codification_reuse
            level: 2
            weight: 0.5
            scope: gated_only
        no:
          - pillar: verification_control
            level: 2
            weight: 1.0

    follow_up_no:
      prompt: "Is that because you've figured out how to get consistent results?"
      answers:
        yes:
          label: "YES"
          subtext: "I know what works"
        no:
          label: "NOPE"
          subtext: "Haven't used AI much"
      signals:
        yes:
          - pillar: verification_control
            level: 4
            weight: 1.0
        no:
          - pillar: verification_control
            level: 1
            weight: 0.5

    image_prompt: "Minimalist editorial illustration, calm executive tone. Visual metaphor for clean mechanical dials or an unstable gauge needle swinging between outcomes, representing randomness and lack of control. Clean shapes, subtle gradients, neutral palette, no text, no logos, no faces, no robots, no sci-fi. Composition suitable for a card thumbnail. High clarity."

  # ---------------------------------------------------------------------------
  # CASE 2C - L2 Context (STARTER 6)
  # ---------------------------------------------------------------------------
  - id: case.2C
    title: "One chat for everything, but nothing carries over"
    body: "I use AI chats a lot. But everything I've told it is scattered across old conversations — some outdated. When I switch to email, documents, or other apps, that knowledge doesn't follow me."
    level: 2
    pillar: context_system
    starter_6: true
    starter_6_order: 1

    answers:
      yes:
        label: "YES"
        subtext: "That's me"
      no:
        label: "NOPE"
        subtext: "Not my situation"

    signals:
      yes:
        - pillar: context_system
          level: 2
          weight: 1.0
      no: []

    follow_up_yes: null

    follow_up_no:
      prompt: "Is that because your context does travel across tools?"
      answers:
        yes:
          label: "YES"
          subtext: "I've got systems for that"
        no:
          label: "NOPE"
          subtext: "I don't use AI chats much"
      signals:
        yes:
          - pillar: context_system
            level: 4
            weight: 1.0
        no:
          - pillar: context_system
            level: 1
            weight: 0.5

    image_prompt: "Minimalist editorial illustration, calm executive tone. Visual metaphor for multiple message bubbles or folders floating disconnected with faint broken links, representing context that does not travel across spaces. Clean shapes, subtle gradients, neutral palette, no text, no logos, no faces, no robots, no sci-fi. Composition suitable for a card thumbnail. High clarity."

  # ---------------------------------------------------------------------------
  # CASE 3A - L3 Context
  # ---------------------------------------------------------------------------
  - id: case.3A
    title: "I keep explaining everything again (and again)"
    body: "I keep re-explaining my situation across different AI tools. The full picture only exists in my head. When a tool does have the right background, it works so much better — which makes the re-explaining more frustrating."
    level: 3
    pillar: context_system

    answers:
      yes:
        label: "YES"
        subtext: "That's me"
      no:
        label: "NOPE"
        subtext: "Not my situation"

    signals:
      yes:
        - pillar: context_system
          level: 3
          weight: 1.0
      no: []

    follow_up_yes: null

    follow_up_no:
      prompt: "Is that because your tools already share context?"
      answers:
        yes:
          label: "YES"
          subtext: "Context flows between tools"
        no:
          label: "NOPE"
          subtext: "I only use one AI tool"
      signals:
        yes:
          - pillar: context_system
            level: 4
            weight: 1.0
        no:
          - pillar: orchestration_load
            level: 2
            weight: 0.5

    image_prompt: "Minimalist editorial illustration, calm executive tone. Visual metaphor for a neat stack of identical briefing cards or repeated sticky notes, implying repeated explanations. Clean shapes, subtle gradients, neutral palette, no text, no logos, no faces, no robots, no sci-fi. Composition suitable for a card thumbnail. High clarity."

  # ---------------------------------------------------------------------------
  # CASE 3B - L3 Orchestration (STARTER 6)
  # ---------------------------------------------------------------------------
  - id: case.3B
    title: "Smart in isolation, dumb in combination"
    body: "AI helps inside individual apps. But nothing connects between them. Each tool is smart on its own and clueless about what I'm doing in the others."
    level: 3
    pillar: orchestration_load
    starter_6: true
    starter_6_order: 2

    answers:
      yes:
        label: "YES"
        subtext: "That's me"
      no:
        label: "NOPE"
        subtext: "Not my situation"

    signals:
      yes:
        - pillar: orchestration_load
          level: 3
          weight: 1.0
      no: []

    follow_up_yes: null

    follow_up_no:
      prompt: "Is that because your AI tools are already connected?"
      answers:
        yes:
          label: "YES"
          subtext: "They work together"
        no:
          label: "NOPE"
          subtext: "I only use one AI tool"
      signals:
        yes:
          - pillar: orchestration_load
            level: 4
            weight: 1.0
        no:
          - pillar: orchestration_load
            level: 2
            weight: 0.5

    image_prompt: "Minimalist editorial illustration, calm executive tone. Visual metaphor for several gears or puzzle pieces that look correct individually but fail to interlock, representing tools that do not combine into workflows. Clean shapes, subtle gradients, neutral palette, no text, no logos, no faces, no robots, no sci-fi. Composition suitable for a card thumbnail. High clarity."

  # ---------------------------------------------------------------------------
  # CASE 3C - L3 Context
  # ---------------------------------------------------------------------------
  - id: case.3C
    title: "Good context in one place, chaos everywhere else"
    body: "In some apps or projects, working with AI feels smooth — it gets what I'm doing. In others (especially chat tools), it's messy and hard to fix. I've seen what good feels like, and now the bad is more frustrating."
    level: 3
    pillar: context_system

    answers:
      yes:
        label: "YES"
        subtext: "That's me"
      no:
        label: "NOPE"
        subtext: "Not my situation"

    signals:
      yes:
        - pillar: context_system
          level: 3
          weight: 1.0
      no: []

    follow_up_yes: null
    follow_up_no: null  # Nuanced enough - no follow-up needed

    image_prompt: "Minimalist editorial illustration, calm executive tone. Visual metaphor for one sharp, clear lens or map panel next to several blurred panels, representing clarity in one place and fog elsewhere. Clean shapes, subtle gradients, neutral palette, no text, no logos, no faces, no robots, no sci-fi. Composition suitable for a card thumbnail. High clarity."

  # ---------------------------------------------------------------------------
  # CASE 3D - L3 Verification
  # ---------------------------------------------------------------------------
  - id: case.3D
    title: "Circular conversations that go nowhere"
    body: "I spend time correcting and clarifying what I want from AI. The conversation gets longer, but we never quite align. Something about how we're working together is broken."
    level: 3
    pillar: verification_control

    answers:
      yes:
        label: "YES"
        subtext: "That's me"
      no:
        label: "NOPE"
        subtext: "Not my situation"

    signals:
      yes:
        - pillar: verification_control
          level: 3
          weight: 1.0
      no: []

    follow_up_yes:
      prompt: "Have you found a way to break out of these loops?"
      answers:
        yes:
          label: "YES"
          subtext: "I have methods that work"
        no:
          label: "NOPE"
          subtext: "Still figuring it out"
      signals:
        yes:
          - pillar: verification_control
            level: 4
            weight: 0.7
        no:
          - pillar: verification_control
            level: 3
            weight: 1.0

    follow_up_no:
      prompt: "Is that because your AI conversations usually converge quickly?"
      answers:
        yes:
          label: "YES"
          subtext: "We align fast"
        no:
          label: "NOPE"
          subtext: "I don't have long AI conversations"
      signals:
        yes:
          - pillar: verification_control
            level: 4
            weight: 1.0
        no:
          - pillar: verification_control
            level: 1
            weight: 0.5

    image_prompt: "Minimalist editorial illustration, calm executive tone. Visual metaphor for clean looping arrows circling without converging, representing conversation without alignment. Clean shapes, subtle gradients, neutral palette, no text, no logos, no faces, no robots, no sci-fi. Composition suitable for a card thumbnail. High clarity."

  # ---------------------------------------------------------------------------
  # CASE 3E - L3 Personal Fit (GATED)
  # ---------------------------------------------------------------------------
  - id: case.3E
    title: "AI doesn't know which hat I'm wearing"
    body: "I have different parts of my life — work, personal projects, family. AI mixes them up. It pulls the wrong assumptions because it doesn't know which \"me\" is talking."
    level: 3
    pillar: personal_fit

    answers:
      yes:
        label: "YES"
        subtext: "That's me"
      no:
        label: "NOPE"
        subtext: "Not my situation"

    signals:
      yes:
        - pillar: personal_fit
          level: 3
          weight: 1.0
          scope: gated_only
      no: []

    follow_up_yes: null

    follow_up_no:
      prompt: "Is that because you keep these contexts separate in AI?"
      answers:
        yes:
          label: "YES"
          subtext: "I have separate setups"
        no:
          label: "NOPE"
          subtext: "I only use AI for one area of life"
      signals:
        yes:
          - pillar: personal_fit
            level: 4
            weight: 1.0
            scope: gated_only
        no:
          - pillar: orchestration_load
            level: 2
            weight: 0.3

    image_prompt: "Minimalist editorial illustration, calm executive tone. Visual metaphor for overlapping lanes or tags that collide, representing mixed roles and contexts. Clean shapes, subtle gradients, neutral palette, no text, no logos, no faces, no robots, no sci-fi. Composition suitable for a card thumbnail. High clarity."

  # ---------------------------------------------------------------------------
  # CASE 4A - L4 Verification (STARTER 6)
  # ---------------------------------------------------------------------------
  - id: case.4A
    title: "Workflows exist, but fall apart without me"
    body: "I can run multi-step work with AI. But when things get busy, it falls apart. Quality checks and handoffs depend on me. If I'm not actively managing it, things fall apart."
    level: 4
    pillar: verification_control
    starter_6: true
    starter_6_order: 3

    answers:
      yes:
        label: "YES"
        subtext: "That's me"
      no:
        label: "NOPE"
        subtext: "Not my situation"

    signals:
      yes:
        - pillar: verification_control
          level: 4
          weight: 1.0
      no: []

    follow_up_yes: null

    follow_up_no:
      prompt: "Is that because your workflows run reliably without you?"
      answers:
        yes:
          label: "YES"
          subtext: "They run on their own"
        no:
          label: "NOPE"
          subtext: "I don't have multi-step AI workflows"
      signals:
        yes:
          - pillar: verification_control
            level: 5
            weight: 1.0
          - pillar: orchestration_load
            level: 5
            weight: 0.7
        no:
          - pillar: orchestration_load
            level: 2
            weight: 0.5

    image_prompt: "Minimalist editorial illustration, calm executive tone. Visual metaphor for a clean workflow pipeline with missing checkpoint nodes or a small leak, representing lack of standardization and reliance on manual intervention. Clean shapes, subtle gradients, neutral palette, no text, no logos, no faces, no robots, no sci-fi. Composition suitable for a card thumbnail. High clarity."

  # ---------------------------------------------------------------------------
  # CASE 4B - L4 Verification
  # ---------------------------------------------------------------------------
  - id: case.4B
