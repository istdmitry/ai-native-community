            level: 3
            weight: 1.5
      - id: ms2.e
        text: "Follow a standard process I've set up for this type of task"
        signals:
          - pillar: orchestration_load
            level: 4
            weight: 1.5
      - id: ms2.f
        text: "Hand it to a specialized AI setup I've built for this kind of work"
        signals:
          - pillar: orchestration_load
            level: 6
            weight: 1.5
          - pillar: personal_fit
            level: 5
            weight: 0.5
            scope: gated_only

  - id: ms.3
