        text: "Hope I remember what I did"
        signals:
          - pillar: codification_reuse
            level: 1
            weight: 1.5
            scope: gated_only
      - id: ms3.b
        text: "Save the prompt that worked"
        signals:
          - pillar: codification_reuse
            level: 2
            weight: 1.5
            scope: gated_only
      - id: ms3.c
        text: "Create a template with the background info I'll need"
        signals:
          - pillar: context_system
            level: 3
            weight: 1.5
      - id: ms3.d
        text: "Add quality checkpoints I can verify against"
        signals:
          - pillar: verification_control
            level: 4
            weight: 1.5
