# =============================================================================
# RESULT BLOCKS
# =============================================================================

result_blocks:
  - id: result.L1
    level: 1
    title: "Level 1 - Ad Hoc Executor"
    you_are: "Using AI for isolated tasks. Nothing stable or repeatable yet."
    breaks: "Each session starts from zero. Results depend on luck and your effort. Nothing compounds."
    cost: "Every good result is a one-off. You can't rely on consistency."
    next_move: "Adopt one repeatable habit. Capture a simple frame (template or checklist) and reuse it."
    note: null

  - id: result.L2
    level: 2
    title: "Level 2 - Repeatable Operator"
    you_are: "Repeating tasks, but context is fragmented across tools and projects."
    breaks: "Portability. The same context rebuilds and drifts across services. Trust requires constant checking."
    cost: "Time spent re-explaining. Quality variance you can't predict."
    next_move: "Build a context pack or template that travels with the work."
    note: null

  - id: result.L3
    level: 3
    title: "Level 3 - Manual Orchestrator"
    you_are: "You are the message bus. You coordinate multiple AIs or agents manually."
    breaks: "Throughput, version drift, switching costs, and hidden assumptions that only you know."
    cost: "Every handoff requires your attention. Parallel work is limited by your bandwidth."
    next_move: "Standardize one workflow so routing is no longer manual."
    note: null

  - id: result.L4
    level: 4
    title: "Level 4 - Process Orchestrator"
    you_are: "Running multi-step work through standardized processes with checkpoints."
    breaks: "System management. Standards, routing rules, escalation, and review load pile up."
    cost: "Maintaining the process becomes work. Exceptions still require you."
    next_move: "Codify review and reuse so the process runs without constant supervision."
    note: null

  - id: result.L5
    level: 5
    title: "Level 5 - Personalized Delegator"
    you_are: "Operating with a system tuned to your cognitive patterns. Orchestration is partly delegated."
    breaks: "Drift. Your patterns change; the system lags behind. Personalization goes stale."
    cost: "The system follows the old you. Misalignment grows silently."
    next_move: "Establish refresh mechanisms for context and behavior."
    note: null

  - id: result.L6
    level: 6
    title: "Level 6 - Digital Team Lead"
    you_are: "Operating with a role-based digital team and explicit escalation rules."
    breaks: "Governance. Boundaries, accountability, and who decides when roles conflict."
    cost: "Scaling creates ambiguity. Decision ownership becomes unclear."
    next_move: "Maintenance discipline and clear decision ownership across roles."
    note: "You're in rare territory. We'd genuinely love to hear how you got here."

  - id: result.L7
    level: 7
    title: "Level 7 - Networked Teams (Horizon)"
    you_are: "Operating where digital teams interact across people via contracts and shared standards."
    breaks: "Governance across people. Permissioning, conflicts, and decision ownership across boundaries."
    cost: "What works for one person doesn't automatically scale to teams."
    next_move: "This level is emerging. If you're here, you're building the future."
    note: "We'd love to learn from you and collaborate."

result_explanation:
  lines:
    - "This is not a grade. It's a constraint map."
    - "Your level reflects the weakest pillar, because that's what limits reliability under load."
    - "Progress is a habit change: small rules repeated until they become automatic."

