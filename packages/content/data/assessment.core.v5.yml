    title: "AI gives you a draft you don't like"
    prompt: "What do you do to prevent this next time?"
    options:
      - id: ms1.a
        text: "Nothing — I'll just fix it each time"
        signals:
          - pillar: verification_control
            level: 1
            weight: 1.5
      - id: ms1.b
        text: "Save the prompt that worked better"
        signals:
          - pillar: verification_control
            level: 2
            weight: 1.5
      - id: ms1.c
        text: "Create a template I can reuse for this type of task"
        signals:
          - pillar: context_system
            level: 3
            weight: 1.5
      - id: ms1.d
        text: "Add a checklist to verify the output meets my standards"
        signals:
          - pillar: verification_control
            level: 4
            weight: 1.5
      - id: ms1.e
        text: "Build it into a standard process with quality checks"
        signals:
          - pillar: orchestration_load
            level: 4
            weight: 1.5
      - id: ms1.f
        text: "Document my decision-making rules so AI knows what tradeoffs I'd make"
        signals:
          - pillar: verification_control
            level: 6
            weight: 1.5
          - pillar: codification_reuse
            level: 5
            weight: 0.5
            scope: gated_only

  - id: ms.2
