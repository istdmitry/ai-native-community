            level: 2
            weight: 1.5
      - id: ms2.c
        text: "Use a prompt I've saved that works well"
        signals:
          - pillar: codification_reuse
            level: 2
            weight: 1.5
            scope: gated_only
      - id: ms2.d
        text: "Use a template with background info already included"
        signals:
